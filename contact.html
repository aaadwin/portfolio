<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/bootstrap.css">
</head>
<style>
    @font-face {
        font-family: Poppins;
        src: url(font/Poppins-Medium.ttf)format('truetype');
    }

    body {
        font-family: Poppins;
    }
</style>
<body>
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="font-size: 25px;">Adwin</a>
            <ul class="navbar-nav gap-3 d-flex flex-row">
                <li class="nav-item">
                    <a class="nav-link link-dark" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link link-dark" href="about.html"">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link link-dark" href="project.html"">Project</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link link-dark" href="contact.html"">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-md-6">
                <h3 class="fw-bold fs-3 pb-3">Mari berdiskusi tentang project selanjutnya!</h3>
                <p class="pb-5">Punya ide menarik? saya terbuka untuk berkolaborasi dan berdiskusi</p>
                <div class="row">
                    <div class="col-md-2">
                        <img src="email.png" alt="email" style="width: 45px; height: 45px;">
                    </div>
                    <div class="col-md-2">
                        <h4>Email</h4>
                        <p>adwin@gmail.com</p>
                    </div>
                </div>
                <div class="row pt-3">
                    <div class="col-md-2">
                        <img src="pin.png" alt="email" style="width: 45px; height: 45px;">
                    </div>
                    <div class="col-md-2">
                        <h4>Lokasi</h4>
                        <p>Indonesia</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 bg-light">
                <form action="">
                    <div class="mb-4 pt-3">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" class="form-control bg-light" id="nama" placeholder="Masukkan nama lengkap anda">
                </div>
                <div class="mb-4 pt-1">
                    <label for="email">Alamat Email</label>
                    <input type="email" class="form-control bg-light" id="email" placeholder="email@domain.com">
                </div>
                <div class="mb-4">
                    <label for="message">Pesan</label>
                    <textarea name="message" id="message" placeholder="Tulis pesan anda disini!" rows="4" class="form-control bg-light"></textarea>
                </div>
                <button class="btn btn-primary w-100 mb-3">Kirim Pesan</button>
                </form>
        </div>
    </div>
</body>
</html>
